<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC26 Club Goal Credits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #077602; --surface: #dfffdf; --border: #e2dfd8; --border-strong: #c8c4bc;
    --text: #1a1917; --text-muted: #6b6860; --text-faint: #a09e9a;
    --accent: #c84b1a; --accent-bg: #fef2ec; --accent-border: #f4c4aa;
    --green: #1a6b3c; --green-bg: #ecf7f1;
    --font: 'DM Sans', system-ui, sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 80px; }

  header { background: var(--text); color: #f7f6f2; padding: 28px 24px 24px; }
  .header-inner { max-width: 780px; margin: 0 auto; }
  .wc-pill { display: inline-block; font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
    text-transform: uppercase; background: var(--accent); color: #fff; padding: 3px 10px;
    border-radius: 4px; margin-bottom: 12px; }
  header h1 { font-size: clamp(22px, 4vw, 32px); font-weight: 600; line-height: 1.2;
    letter-spacing: -.02em; margin-bottom: 8px; }
  header p { font-size: 14px; color: #a09e9a; line-height: 1.5; max-width: 540px; }
  .header-meta { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  .header-meta span { font-family: var(--mono); font-size: 12px; color: #6b6860; }

  main { max-width: 780px; margin: 0 auto; padding: 24px 24px 0; }

  #stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .stat-label { font-size: 11px; font-family: var(--mono); text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-faint); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -.02em; }

  #controls { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  #search { flex: 1; min-width: 160px; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-family: var(--font); font-size: 13px; background: var(--surface);
    color: var(--text); outline: none; }
  #search:focus { border-color: var(--border-strong); }
  #sort-btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); font-size: 13px; font-family: var(--font); cursor: pointer;
    color: var(--text-muted); white-space: nowrap; }
  #sort-btn:hover { border-color: var(--border-strong); color: var(--text); }

  #clubs { display: flex; flex-direction: column; gap: 6px; }
  .club-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: border-color .15s; }
  .club-card:hover { border-color: var(--border-strong); }
  .club-card.open  { border-color: var(--border-strong); }

  .summary { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    cursor: pointer; user-select: none; }
  .logo-wrap { width: 36px; height: 36px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; }
  .logo { width: 36px; height: 36px; object-fit: contain; }
  .logo-fallback { width: 36px; height: 36px; border-radius: 50%; background: var(--bg);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text-muted); }
  .club-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .club-nation { font-size: 11px; color: var(--text-faint); font-family: var(--mono); margin-top: 1px; }
  .goal-count { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--accent);
    min-width: 20px; text-align: right; }
  .goal-label { font-size: 11px; color: var(--text-faint); }
  .chevron { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-faint); transition: transform .2s; }
  .club-card.open .chevron { transform: rotate(180deg); }

  .bar-row { padding: 0 14px 10px; display: flex; align-items: center; gap: 8px; }
  .bar-track { flex: 1; height: 3px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .bar-fill  { height: 100%; background: var(--accent); border-radius: 2px; }

  .details { display: none; border-top: 1px solid var(--border); padding: 12px 14px 14px; }
  .club-card.open .details { display: block; }
  .details-header { font-size: 11px; font-family: var(--mono); text-transform: uppercase;
    letter-spacing: .05em; color: var(--text-faint); margin-bottom: 8px; }
  .player-row { display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .player-row:last-child { border-bottom: none; }
  .player-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .player-nat  { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .player-goals { font-family: var(--mono); font-size: 13px; font-weight: 500;
    color: var(--accent); flex-shrink: 0; }
  .player-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px;
    background: var(--green-bg); color: var(--green); font-family: var(--mono);
    flex-shrink: 0; border: 1px solid #b4e0c8; }
  .player-tag.former { background: var(--bg); color: var(--text-muted); border-color: var(--border); }

  #status { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
    margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
    padding: 16px 20px; color: #991b1b; font-size: 13px; line-height: 1.6; }
  .error-box strong { display: block; margin-bottom: 4px; font-weight: 600; }

  @media (max-width: 480px) {
    header { padding: 20px 16px; }
    main   { padding: 16px 16px 0; }
    .player-tag { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="wc-pill">FIFA World Cup 2026</div>
    <h1>Club Goal Credits</h1>
    <p>Every WC26 goal credited to each senior club the scorer has represented.</p>
    <div class="header-meta">
      <span id="last-updated"></span>
    </div>
  </div>
</header>

<main>
  <div id="stats-bar" style="display:none">
    <div class="stat-card"><div class="stat-label">Total goals</div><div class="stat-value" id="s-goals">—</div></div>
    <div class="stat-card"><div class="stat-label">Clubs credited</div><div class="stat-value" id="s-clubs">—</div></div>
    <div class="stat-card"><div class="stat-label">Scorers</div><div class="stat-value" id="s-scorers">—</div></div>
    <div class="stat-card"><div class="stat-label">Nations</div><div class="stat-value" id="s-nations">—</div></div>
  </div>
  <div id="controls" style="display:none">
    <input type="search" id="search" placeholder="Search clubs or players…">
    <button id="sort-btn">Sort: Goals ↓</button>
  </div>
  <div id="status"><span class="spinner"></span> Loading…</div>
  <div id="clubs"></div>
</main>

<script>
let allClubs = [];
let sortAsc  = false;

document.getElementById('search').addEventListener('input', render);
document.getElementById('sort-btn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  document.getElementById('sort-btn').textContent = sortAsc ? 'Sort: Goals ↑' : 'Sort: Goals ↓';
  render();
});

(async () => {
  try {
    // data.json is generated by GitHub Actions and lives next to index.html
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error(`data.json returned ${resp.status} — has the GitHub Action run yet?`);
    const data = await resp.json();

    if (!data.clubs || !data.clubs.length) {
      document.getElementById('status').textContent =
        'No goals recorded yet — data will appear once matches are played.';
      return;
    }

    allClubs = data.clubs;

    document.getElementById('s-goals').textContent   = data.totalGoals;
    document.getElementById('s-clubs').textContent   = data.clubs.length;
    document.getElementById('s-scorers').textContent = data.scorers;
    document.getElementById('s-nations').textContent = data.nations;
    document.getElementById('stats-bar').style.display  = 'grid';
    document.getElementById('controls').style.display   = 'flex';
    document.getElementById('status').style.display     = 'none';

    const d = new Date(data.updatedAt);
    document.getElementById('last-updated').textContent =
      'Updated ' + d.toLocaleDateString([], {month:'short',day:'numeric'}) +
      ' at ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    render();
  } catch(e) {
    document.getElementById('status').innerHTML =
      `<div class="error-box"><strong>Could not load data</strong>${e.message}</div>`;
  }
})();

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let clubs = [...allClubs];
  if (q) clubs = clubs.filter(c =>
    c.club.toLowerCase().includes(q) ||
    c.players.some(p => p.name.toLowerCase().includes(q))
  );
  clubs.sort((a, b) => sortAsc ? a.goals - b.goals : b.goals - a.goals);

  const max = clubs[0]?.goals || 1;
  const container = document.getElementById('clubs');
  container.innerHTML = '';

  if (!clubs.length) {
    container.innerHTML = '<div id="status" style="padding:32px 0">No clubs match your search.</div>';
    return;
  }

  clubs.forEach(c => {
    const abbr = c.club.split(/\s+/).map(w => w[0]).join('').slice(0, 3).toUpperCase();
    const pct  = Math.round(c.goals / max * 100);
    const div  = document.createElement('div');
    div.className = 'club-card';
    div.innerHTML = `
      <div class="summary">
        <div class="logo-wrap">
          ${c.logo
            ? `<img class="logo" src="${c.logo}" alt=""
                onerror="this.parentNode.innerHTML='<div class=\\"logo-fallback\\"></div>>`
            : `<div class="logo-fallback"></div>`}
  <!--      </div>  -->
        <div style="flex:1;min-width:0">
          <div class="club-name">${c.club}</div>
          <div class="club-nation">${[c.nation, c.league].filter(Boolean).join(' · ')}</div>
        </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="goal-count">${c.goals}</div>
          <div class="goal-label">goal${c.goals !== 1 ? 's' : ''}</div>
        </div>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
      </div>
      <div class="bar-row">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-faint);
          min-width:32px;text-align:right">${pct}%</span>
      </div>
      <div class="details">
        <div class="details-header">${c.players.length} scorer${c.players.length !== 1 ? 's' : ''}</div>
        ${[...c.players].sort((a, b) => b.goals - a.goals).map(p => `
          <div class="player-row">
            <div>
              <div class="player-name">${p.name}</div>
              <div class="player-nat">${p.nat}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="player-tag ${p.current ? '' : 'former'}">${p.current ? 'Current' : 'Former'}</span>
              <span class="player-goals">${p.goals}g</span>
            </div>
          </div>`).join('')}
      </div>`;
    div.querySelector('.summary').addEventListener('click', () => div.classList.toggle('open'));
    container.appendChild(div);
  });
}
</script>
</body>
</html>
